---
name: Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - closed
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

