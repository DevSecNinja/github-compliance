---
name: Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - closed
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/pages.yml@a8f6fb55948a23ca75c427a46dc00787b4bd5d70 # main
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write
    with:
      # renovate: datasource=node-version depName=node
      node-version: "24"
      node-cache: "npm"
      # renovate: datasource=npm depName=wrangler
      wrangler-version: "4"
      artifact-path: "dist"
      test-setup-command: npx playwright install --with-deps chromium
      test-command: npm test
      build-command: >-
        VITE_GITHUB_AUTH_BROKER_URL="${{ vars.VITE_GITHUB_AUTH_BROKER_URL }}"
        npm run build
      github-pages: false
      cloudflare-preview: true
      cloudflare-production: true
      cloudflare-project-name: "github-compliance"
      cloudflare-production-branch: "main"
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
