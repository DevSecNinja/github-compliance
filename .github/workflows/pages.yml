---
name: Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - closed
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/pages.yml@998ff283c3a431bbcb74421180121826cca8fdd7 # v1.4.0
    permissions:
      contents: read
      deployments: write
      id-token: write
      issues: write
      pages: write
      pull-requests: write
    with:
      # renovate: datasource=node-version depName=node
      node-version: "24"
      node-cache: "npm"
      # renovate: datasource=npm depName=wrangler
      wrangler-version: "4"
      artifact-path: "dist"
      test-setup-command: npx playwright install --with-deps chromium
      test-command: npm test
      build-command: >-
        VITE_GITHUB_AUTH_BROKER_URL="${{ vars.VITE_GITHUB_AUTH_BROKER_URL }}"
        npm run build
      cloudflare-preview: false
