---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/lint.yml@27fd66740c629ea38380dcd3bf93e7bc74c54247 # v1.9.0
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.6.1"
      # renovate: datasource=github-releases depName=golangci/golangci-lint
      golangci-lint-version: "v2.12.2"
      lint-fail-on-error: false
      lint-go: false
      lint-shellcheck: false
      lint-shfmt: false
      lint-checkov: false
      lint-trivy: false
      lint-config-drift: true
