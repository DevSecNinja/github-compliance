<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - GitHub Compliance</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #202734;
        font-family: "Segoe UI", sans-serif;
        background: #f8f5ef;
      }

      main {
        width: min(32rem, calc(100% - 2rem));
        padding: 2rem;
        border: 1px solid rgba(68, 78, 96, 0.18);
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline.</h1>
      <p>Open the app again when your connection returns. Cached scan data remains on this device.</p>
    </main>
  </body>
</html>
